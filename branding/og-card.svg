<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="XI Open Graph card">
  <!--
    Open Graph card: 1200×630.
    Used by X / Facebook / LinkedIn / Discord / Telegram / iMessage when the site is shared.
  -->
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="ogGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6C156"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#A0801A"/>
    </linearGradient>
    <radialGradient id="ogVignette" cx="50%" cy="50%" r="60%">
      <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Faint pitch lines -->
  <g stroke="#1a1a1a" stroke-width="1" fill="none">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Top label -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#888" letter-spacing="6">
    <text x="80" y="60">VOL. 01 · 1930–2022 · 22 CHAPTERS</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#C9A227" letter-spacing="3" text-anchor="end">
    <text x="1120" y="60">ON CHAIN · BSC · $XI</text>
  </g>

  <!-- 5 dots (5-copy max ceiling) -->
  <g fill="url(#ogGold)">
    <circle cx="540" cy="130" r="4"/>
    <circle cx="570" cy="124" r="4"/>
    <circle cx="600" cy="122" r="4"/>
    <circle cx="630" cy="124" r="4"/>
    <circle cx="660" cy="130" r="4"/>
  </g>

  <!-- BIG XI -->
  <g font-family="'Trajan Pro', 'Cinzel', 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="600" y="370" font-size="320" fill="url(#ogGold)" letter-spacing="-6">XI</text>
  </g>

  <!-- Concept-redefinition tagline -->
  <g font-family="'Inter', 'Geist Sans', system-ui, sans-serif" fill="#FFFFFF" text-anchor="middle">
    <text x="600" y="430" font-size="28" font-weight="600">A new kind of football collectible.</text>
    <text x="600" y="465" font-size="20" font-weight="400" fill="#cccccc">Not an NFT. Not a memecoin. Both — on chain.</text>
  </g>

  <!-- Hint subtagline -->
  <g font-family="'Trajan Pro', 'Cinzel', 'Georgia', serif" font-size="16" fill="#C9A227" text-anchor="middle" letter-spacing="2">
    <text x="600" y="510">Built on PancakeSwap Infinity hooks. The number XI will make sense by the end.</text>
  </g>

  <!-- Bottom: stats strip -->
  <g font-family="'JetBrains Mono', monospace" fill="#888" text-anchor="middle" letter-spacing="1">
    <text x="300" y="565" font-size="12">— TOURNAMENTS —</text>
    <text x="300" y="595" font-size="22" fill="#C9A227" font-weight="700">22+</text>

    <text x="600" y="565" font-size="12">— PLAYER IDENTITIES —</text>
    <text x="600" y="595" font-size="22" fill="#C9A227" font-weight="700">10,964</text>

    <text x="900" y="565" font-size="12">— COPIES MAX —</text>
    <text x="900" y="595" font-size="22" fill="#C9A227" font-weight="700">5</text>
  </g>

  <!-- Bottom-most -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#555" letter-spacing="3">
    <text x="80" y="615">onxi.art</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#555" letter-spacing="3" text-anchor="end">
    <text x="1120" y="615">FOREVER FORWARD · NEVER BACKWARD</text>
  </g>

  <!-- Vignette (last) -->
  <rect width="1200" height="630" fill="url(#ogVignette)" pointer-events="none"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="XI X (Twitter) banner">
  <!-- X / Twitter banner: 1500x500 (3:1).
       Editorial-magazine layout (unipeg-inspired) with PCS-leaning gold accents. -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="bnrGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6C156"/>
      <stop offset="100%" stop-color="#A0801A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Top editorial label (unipeg-style "VOL. 01") -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#888" letter-spacing="6">
    <text x="60" y="60">VOL. 01 · 1930–2022 · 22 CHAPTERS</text>
  </g>

  <!-- Right top tag -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#C9A227" text-anchor="end" letter-spacing="3">
    <text x="1440" y="60">A PCS INFINITY HOOK COLLECTION</text>
  </g>

  <!-- Left mid: 22 small squares (visualizes pool extent) -->
  <g fill="#2a2a2a">
    <rect x="60"  y="180" width="14" height="14"/>
    <rect x="80"  y="180" width="14" height="14"/>
    <rect x="100" y="180" width="14" height="14"/>
    <rect x="120" y="180" width="14" height="14"/>
    <rect x="60"  y="200" width="14" height="14"/>
    <rect x="80"  y="200" width="14" height="14"/>
    <rect x="100" y="200" width="14" height="14"/>
    <rect x="120" y="200" width="14" height="14"/>
    <rect x="140" y="200" width="14" height="14"/>
    <rect x="160" y="200" width="14" height="14"/>
    <rect x="60"  y="220" width="14" height="14"/>
    <rect x="80"  y="220" width="14" height="14"/>
    <rect x="100" y="220" width="14" height="14"/>
    <rect x="120" y="220" width="14" height="14"/>
    <rect x="140" y="220" width="14" height="14"/>
    <rect x="160" y="220" width="14" height="14"/>
    <rect x="60"  y="240" width="14" height="14"/>
    <rect x="80"  y="240" width="14" height="14"/>
    <rect x="100" y="240" width="14" height="14"/>
    <rect x="120" y="240" width="14" height="14"/>
    <rect x="140" y="240" width="14" height="14"/>
    <rect x="160" y="240" width="14" height="14"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#C9A227" letter-spacing="2">
    <text x="60" y="280">+ GROWING · APPEND-ONLY</text>
  </g>

  <!-- Center: BIG XI -->
  <g font-family="'Trajan Pro', 'Cinzel', 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="750" y="310" font-size="280" fill="url(#bnrGold)" letter-spacing="-4">XI</text>
  </g>

  <!-- Below XI: concept tagline -->
  <g font-family="'Inter', 'Geist Sans', system-ui, sans-serif" fill="#cccccc" text-anchor="middle">
    <text x="750" y="365" font-size="20" font-weight="500">Not an NFT in the conventional sense. Not a memecoin. Both.</text>
  </g>

  <!-- Right mid: Day Zero callout -->
  <g font-family="'JetBrains Mono', monospace" fill="#aaaaaa">
    <text x="1440" y="200" font-size="22" font-weight="600" text-anchor="end" fill="#C9A227">DAY ZERO</text>
    <text x="1440" y="225" font-size="14" text-anchor="end">Edition #1 forever.</text>
    <text x="1440" y="245" font-size="14" text-anchor="end">10× discount vs late mints.</text>
    <text x="1440" y="265" font-size="14" text-anchor="end">One trophy per cup, forever.</text>
  </g>

  <!-- Bottom strip: 5 dots representing 5-copy max + tagline -->
  <g fill="url(#bnrGold)">
    <circle cx="710" cy="425" r="5"/>
    <circle cx="730" cy="425" r="5"/>
    <circle cx="750" cy="425" r="5"/>
    <circle cx="770" cy="425" r="5"/>
    <circle cx="790" cy="425" r="5"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#666" text-anchor="middle" letter-spacing="2">
    <text x="750" y="455">5 COPIES MAX · 10× ESCALATOR · THE FIFTH NEVER EXPECTED</text>
  </g>

  <!-- Bottom-most: ID line (editorial feel) -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#555" letter-spacing="3">
    <text x="60" y="475">ON CHAIN · BSC · $XI</text>
    <text x="1440" y="475" text-anchor="end">FOREVER FORWARD · NEVER BACKWARD</text>
  </g>
</svg>
